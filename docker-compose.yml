version: '3.8'
services:
  mail:
    image: docker.io/mailserver/docker-mailserver:latest
    container_name: mail
    hostname: mail
    domainname: qumail.local
    env_file: ./mail.env
    ports:
      - "25:25"     # SMTP
      - "587:587"   # Submission
      - "143:143"   # IMAP
      - "993:993"   # IMAPS
    volumes:
      - ./data/maildata:/var/mail
      - ./data/mailstate:/var/mail-state
      - ./data/maillogs:/var/log/mail
      - ./data/dkim:/tmp/docker-mailserver/opendkim/keys
      - ./config/:/tmp/docker-mailserver/
    tmpfs:
      - /var/spool/postfix
      - /var/lib/rspamd
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE

  db:
    image: postgres:15-alpine
    container_name: roundcube_db
    environment:
      - POSTGRES_DB=roundcube
      - POSTGRES_USER=roundcube
      - POSTGRES_PASSWORD=roundcube_pass
    volumes:
      - ./data/db:/var/lib/postgresql/data
    restart: always

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=pgsql
      - ROUNDCUBEMAIL_DB_HOST=db
      - ROUNDCUBEMAIL_DB_NAME=roundcube
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD=roundcube_pass
      - ROUNDCUBEMAIL_DEFAULT_HOST=mail
      - ROUNDCUBEMAIL_SMTP_SERVER=mail
      - ROUNDCUBEMAIL_SMTP_PORT=587
    ports:
      - "8080:80"
    depends_on:
      - mail
      - db
    restart: always
